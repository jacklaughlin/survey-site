kind = "web"
previewPath = "/"
title = "Football Survey"
version = "1.0.0"
id = "artifacts/football-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20105

[services.development]
run = "pnpm --filter @workspace/football-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/football-survey", "run", "build" ]
publicDir = "artifacts/football-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20105"
BASE_PATH = "/"
